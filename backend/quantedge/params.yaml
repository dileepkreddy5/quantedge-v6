# QuantEdge — Committed Starting Parameters
# Source: Build Manual v1.0, Appendix §22 (Tables 36–40).
#
# THE RULE (Manual §22, Table 41):
#   Starting points, not truths. Commit them now, in writing, BEFORE the
#   first backtest. Change any one only with a logged reason in the Research
#   Journal. NEVER tune a kill-threshold number after seeing the result it
#   judges. The whole point of the kill-threshold is that it is fixed before
#   results are visible. A silent edit is a discipline violation.

schema_version: "1.0"
frozen: true
committed_on: "2026-06"

# --- Winner definition (Table 36) ---
winner_definition:
  forward_horizon_years: 5
  horizon_sweep_years: [3, 5, 7]
  market_test:
    rule: "cumulative excess return vs sector >= 2x over the window"
    multiple: 2.0
  business_test:
    revenue_multiple: 2.0
    require_roic_improving: true
  survival_test:
    max_terminal_dilution_pct: 40
    exclude_bankrupt: true
  min_winner_definitions_reported: 3

# --- Kill-threshold (Table 37) — committed before first backtest ---
kill_threshold:
  min_oos_lift_over_base_rate: 2.0
  min_t_stat: 3.0
  calibration_tolerance_pct: 20
  min_distinct_regimes: 2

# --- Network graph (Table 38) ---
network_graph:
  edge_materiality_floor_pct: 10
  distance_decay: {tier_1: 1.0, tier_2: 0.5, tier_3: 0.25}
  edge_confirmation_sources: 2
  shock_window_months: [1, 3]

# --- Acceleration divergence (Table 39) ---
acceleration_divergence:
  timeframe_ladder: ["1w", "2w", "1m", "2m", "4m", "6m", "1y"]
  fundamental_acceleration_min_consecutive_periods: 2
  quiet_price_percentile_max: 50
  inflection_corroborating_sources: 1

# --- Cap tiers and universe (Table 40) ---
cap_tiers:
  large_cap_min_usd: 10000000000
  mid_cap_usd: [2000000000, 10000000000]
  small_cap_usd: [300000000, 2000000000]
universe:
  liquidity_floor_adv_usd: 1000000
  scope: "full_liquid_us"
  display_n_per_tier: 100

# --- Cost model (§13 — gross returns never shown alone) ---
costs:
  commission_bps: 1.0
  slippage_bps: 5.0
  spread_bps: 2.0

# --- REBOUND tracker (step-11) — committed 2026-07-12, BEFORE any backtest ---
# Discounted-quality rebound: deep drawdown x improving business x confirmation.
# Provenance: DeBondtThaler1985, Piotroski2000, ChanLakonishokSougiannis2001,
#             CohenMalloyPomorski2012, IkenberryLakonishokVermaelen1995.
# THE RULE (same as §22): starting points, not truths. Any change requires a
# journal entry. NEVER tune kill_threshold after seeing the result it judges.
rebound:
  committed_on: "2026-07-12"
  frozen: true
  universe:
    min_drawdown_from_3y_high: 0.35   # at least -35% from 3y high to qualify
    liquidity_floor_adv_usd: 1000000
    min_price_usd: 2.0                # no sub-$2 lottery tickets
  discount:
    lookback_high_years: 3
    valuation_history_years: 5
    ps_vs_5y_median_max: 0.70         # P/S <= 70% of own 5y median
  health:
    min_growth_quarters: 4            # consecutive YoY revenue-growth quarters
    min_piotroski: 5
    min_revenue_base_usd: 25000000    # tiny-base rule (reused from multibagger)
  disqualifiers:                      # the falling-knife filter — any one = OUT
    ttm_revenue_shrinking: true       # TTM revenue below prior TTM = out
    max_leverage_increase_yoy: 0.10   # delta(liabilities/assets) > +0.10 = out
    max_share_dilution_yoy: 0.10      # >10% share count growth = out
    min_cash_runway_months: 18        # burn rate must survive 18 months
  stages:
    basing_min_days_since_low: 60
    turning_updayvol_min: 0.55
    turning_min_accum_weeks: 3
    recovering_min_off_low: 0.25      # +25% off the low = RECOVERING
  confirm:
    volume_baseline_days: 60
    volume_recent_week_days: 5
    volume_recent_month_days: 21
    accum_updayvol_min: 0.55
    insider_cluster_min_buyers: 2     # opportunistic cluster = 2+ distinct buyers
    insider_cluster_window_days: 90
    buyback_lookback_quarters: 4
  display_n_per_tier: 100
  # Kill-thresholds for the promotion gate — frozen local copy (Table 37 bars)
  kill_threshold:
    min_oos_lift_over_base_rate: 2.0
    min_t_stat: 3.0
    calibration_tolerance_pct: 20
    min_distinct_regimes: 2
  # Scoring weights (step-20) — sum to exactly 100; committed BEFORE the
  # step-21 backtest. Tuning after seeing results requires a journal entry.
  scoring:
    dd_depth: 15
    cheap_vs_self: 10
    growth_streak: 15
    fscore: 10
    margin: 5
    accruals: 3
    roic: 2
    accum_streak: 8
    upday_share: 5
    vol_ratio: 4
    buyback: 4
    insider: 4
    rd_intensity: 3
    rd_growth: 2
    val_history: 6
    verifiable: 4
  # Pre-registered SECOND test (step-22) — committed 2026-07-12 BEFORE its
  # result is known. Hypothesis: restricting to stages that have stopped
  # falling (TURNING, RECOVERING) turns the strategy positive. This is a
  # SECOND look at the same data, so the bar is RAISED vs the primary gate
  # (multiple-comparison honesty). One shot. Failing this = the idea is done
  # on this data and waits for deeper history.
  rebound_stage_restricted:
    committed_on: "2026-07-12"
    frozen: true
    eligible_stages: ["TURNING", "RECOVERING"]
    kill_threshold:
      min_oos_lift_over_base_rate: 1.5
      min_t_stat: 2.5
      min_distinct_regimes: 2
      min_dates: 3

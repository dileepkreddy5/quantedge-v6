# Cross-sectional alpha model — frozen config (committed before results).
# The gate that decides ship / no-ship, judged on walk-forward rank-IC.
alpha_xs:
  committed_on: "2026-07-12"
  frozen: true
  label: fwd_3m_rank
  fwd_nbars: 63                # ~3 trading months
  min_dollar_adv: 2000000      # $2M ADV liquidity floor
  min_train_months: 12
  rebalance: monthly
  kill_threshold:
    min_mean_rank_ic: 0.03     # institutional bar: sustained IC >= 0.03 is real
    min_ic_t_stat: 3.0
    min_positive_month_frac: 0.55

# Portfolio construction gate (Stage H) — frozen before results.
# Does the validated IC become money after costs? Long top-decile vs SPY.
alpha_portfolio:
  committed_on: "2026-07-13"
  frozen: true
  top_frac: 0.10               # long the top-decile predicted names
  kill_threshold:
    min_ann_excess_return: 0.03   # >= 3%/yr net excess over SPY
    min_sharpe_excess: 0.5        # excess-return Sharpe >= 0.5
    min_t_stat: 2.0               # mean period excess significant
    max_drawdown_excess: -0.35    # excess curve MDD not worse than -35%

# Pre-registered long-short spread test — committed 2026-07-13 before running.
# Isolates the signal from the benchmark: top-decile minus bottom-decile.
alpha_longshort:
  committed_on: "2026-07-13"
  frozen: true
  top_frac: 0.10
  bottom_frac: 0.10
  kill_threshold:
    min_ann_spread: 0.04        # >= 4%/yr top-minus-bottom, net of 2x costs
    min_sharpe: 0.6
    min_t_stat: 2.5
    min_positive_frac: 0.55

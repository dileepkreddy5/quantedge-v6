###############################################################################
#  QuantEdge v6.0 — docker-compose.yml (Personal Use)
#
#  Matches production ECS architecture exactly:
#    - Redis runs as a sidecar alongside the backend (same network)
#    - REDIS_URL = redis://localhost:6379/0 (matches ECS task definition)
#    - PostgreSQL runs separately (matches RDS in production)
#
#  Start for local dev:
#    docker-compose up -d
#    export $(cat .env | xargs)
#    uvicorn main_v6:app --reload --port 8000
###############################################################################

version: "3.9"

services:

  # PostgreSQL — matches RDS db.t3.micro, PostgreSQL 15 in production
  postgres:
    image: postgres:15-alpine
    container_name: quantedge-db
    environment:
      POSTGRES_DB:       quantedge
      POSTGRES_USER:     quantedge
      POSTGRES_PASSWORD: quantedge
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quantedge -d quantedge"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Redis — matches the sidecar container in production ECS task
  # REDIS_URL = redis://localhost:6379/0 (same as production)
  redis:
    image: redis:7-alpine
    container_name: quantedge-redis
    ports:
      - "6379:6379"
    command: >
      redis-server
      --maxmemory 96mb
      --maxmemory-policy allkeys-lru
      --save ""
      --appendonly no
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:

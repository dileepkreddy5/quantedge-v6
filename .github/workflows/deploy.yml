##################################################################
# QuantEdge v6.0 — CI/CD Pipeline
# Auto-deploys on push to main branch
# Frontend → S3 → CloudFront invalidation
# Backend  → ECR → ECS rolling update
##################################################################

name: QuantEdge Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: quantedge-api
  ECS_CLUSTER: quantedge-cluster
  ECS_SERVICE: quantedge-api
  S3_FRONTEND: quantedge-frontend-dileep
  CLOUDFRONT_DISTRIBUTION_ID: ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}

jobs:
  ##──────────────────────────────────────────────────────────##
  #  BACKEND: Build → Push ECR → Update ECS                   #
  ##──────────────────────────────────────────────────────────##
  deploy-backend:
    name: Backend → ECR → ECS
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to ECR
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY:latest
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Update ECS Service (rolling deployment)
        run: |
          aws ecs update-service \
            --cluster $ECS_CLUSTER \
            --service $ECS_SERVICE \
            --force-new-deployment \
            --region $AWS_REGION

      - name: Wait for ECS to stabilize
        run: |
          aws ecs wait services-stable \
            --cluster $ECS_CLUSTER \
            --services $ECS_SERVICE \
            --region $AWS_REGION
          echo "✅ ECS deployment stable"

  ##──────────────────────────────────────────────────────────##
  #  FRONTEND: Build React → Upload S3 → Invalidate CloudFront#
  ##──────────────────────────────────────────────────────────##
  deploy-frontend:
    name: Frontend → S3 → CloudFront
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build React app
        env:
          REACT_APP_API_URL: ${{ secrets.REACT_APP_API_URL }}
          CI: false  # Prevent treating warnings as errors
        run: npm run build

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Deploy to S3
        run: |
          # Sync with cache control headers
          # HTML files: no-cache (always fetch latest)
          aws s3 sync build/ s3://$S3_FRONTEND/ \
            --delete \
            --cache-control "no-cache,no-store,must-revalidate" \
            --exclude "*" --include "*.html"

          # JS/CSS: 1 year cache (content-hashed filenames)
          aws s3 sync build/ s3://$S3_FRONTEND/ \
            --delete \
            --cache-control "max-age=31536000,immutable" \
            --exclude "*.html"

      - name: Invalidate CloudFront cache
        run: |
          INVALIDATION_ID=$(aws cloudfront create-invalidation \
            --distribution-id $CLOUDFRONT_DISTRIBUTION_ID \
            --paths "/*" \
            --query 'Invalidation.Id' \
            --output text)
          echo "CloudFront invalidation: $INVALIDATION_ID"
          # Wait for invalidation
          aws cloudfront wait invalidation-completed \
            --distribution-id $CLOUDFRONT_DISTRIBUTION_ID \
            --id $INVALIDATION_ID
          echo "✅ CloudFront cache cleared"

  ##──────────────────────────────────────────────────────────##
  #  NOTIFY on completion                                      #
  ##──────────────────────────────────────────────────────────##
  notify:
    name: Notify Dileep
    needs: [deploy-backend, deploy-frontend]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Send SNS notification
        run: |
          STATUS="${{ needs.deploy-backend.result }} / ${{ needs.deploy-frontend.result }}"
          aws sns publish \
            --topic-arn ${{ secrets.SNS_TOPIC_ARN }} \
            --subject "QuantEdge Deploy: $STATUS" \
            --message "Deployment completed at $(date -u). Backend: ${{ needs.deploy-backend.result }}. Frontend: ${{ needs.deploy-frontend.result }}. Commit: ${{ github.sha }}. URL: https://quant.dileepkapu.com"
